<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: Helvetica, Arial, sans-serif; color: #222; }
    h1 { color: #5b8def; margin-bottom: 0; }
    .meta { color: #666; margin-top: 4px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    th { background: #f0f3fa; }
  </style>
</head>
<body>
  <h1>{{ company_name }}</h1>
  <p class="meta">Invoice <strong>{{ invoice_number }}</strong> &middot; {{ date }}</p>
  <p>Billed to: {{ customer_name }}</p>
  <table>
    <tr><th>Item</th><th>Amount</th></tr>
    {% for item in items %}<tr><td>{{ item.name }}</td><td>{{ item.amount }}</td></tr>
    {% endfor %}<tr><th>Total</th><th>{{ total }}</th></tr>
  </table>
</body>
</html>
